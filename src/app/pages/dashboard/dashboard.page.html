<section class="grid">
  <mat-card>
    <mat-card-header>
      <mat-card-title>資料摘要</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <mat-list>
        @for (stat of dashboardStats(); track $index) {
          <mat-list-item> {{ stat.label }}：{{ stat.value }} </mat-list-item>
        }
      </mat-list>
    </mat-card-content>
  </mat-card>
</section>
