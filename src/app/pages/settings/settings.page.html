<div class="fade-in">
  <div class="masthead">
    <div class="masthead-left">
      <div>
        <span class="eyebrow">System Settings — Configuration</span>
        <h2 class="display-title" style="font-size: 26px; margin: 4px 0 0; font-weight: 600">
          系統設定
        </h2>
      </div>
    </div>
    <div class="masthead-right"><div class="doc-no">CFG / 2026</div></div>
  </div>

  <div style="margin-top: 22px; max-width: 560px">
    <div class="file-card">
      <div class="file-card-head">
        <div>
          <div class="eyebrow">§ 01 · 閾值</div>
          <div class="file-card-title">庫存警示</div>
        </div>
      </div>
      <div class="file-card-body">
        <mat-form-field appearance="outline" style="width: 100%" class="mono">
          <mat-label>全域安全庫存量</mat-label>
          <input
            matInput
            type="number"
            min="0"
            [value]="state().settings.defaultLowStockThreshold"
            (input)="updateDefaultLowStockThreshold($any($event.target).value)"
          />
        </mat-form-field>
      </div>
    </div>
  </div>
</div>
