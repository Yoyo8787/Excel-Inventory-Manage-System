<header class="toolbar">
  <div class="toolbar-left">
    <button class="btn btn-ghost btn-icon" (click)="layoutService.toggleSidenav()" title="折疊側欄">
      <span class="mat-icon">menu_open</span>
    </button>
    <div class="crumb">
      <span class="crumb-title">{{ pageLabel() }}</span>
    </div>
  </div>

  <div class="toolbar-right">
    <div class="meta-group">
      <span class="eyebrow">最後存檔</span>
      <span class="meta-val">{{ lastSavedAt() || '—— —— ——' }}</span>
    </div>
    <div class="meta-group">
      <span class="eyebrow">存檔</span>
      <span class="tag dot" [class.red]="isDirty()" [class.green]="!isDirty()">
        {{ isDirty() ? '需要存檔' : '無改動' }}
      </span>
    </div>
    <button class="btn btn-primary btn-sm" (click)="onSave()">
      <span class="mat-icon sm">save</span>
      存檔
    </button>
  </div>
</header>
