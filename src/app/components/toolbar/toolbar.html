<mat-toolbar color="primary" class="flex justify-between items-center">
  <button
    matMiniFab
    aria-label="Example icon button with a menu icon"
    (click)="layoutService.toggleSidenav()"
    class="cursor-pointer"
  >
    <mat-icon>menu</mat-icon>
  </button>
  <mat-chip-set>
    <mat-chip>
      {{ '最後存檔: ' + (lastSavedAt() || '尚未保存') }}
    </mat-chip>
    <mat-chip>
      {{ isDirty() ? '需要存檔' : '無改動' }}
    </mat-chip>
  </mat-chip-set>
</mat-toolbar>
