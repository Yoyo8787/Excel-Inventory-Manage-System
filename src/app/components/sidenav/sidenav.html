<aside class="sidenav">
  <div class="sidenav-head">
    <div style="display: flex; align-items: center; gap: 10px">
      <div
        style="
          width: 30px;
          height: 30px;
          border-radius: 8px;
          background: var(--mint-500);
          display: flex;
          align-items: center;
          justify-content: center;
          color: #fff;
          flex-shrink: 0;
        "
      >
        <span class="mat-icon sm">inventory_2</span>
      </div>
      <div style="line-height: 1.2">
        <div style="font-size: 15px; font-weight: 600; color: var(--ink)">Excel 庫存</div>
      </div>
    </div>
  </div>

  <nav class="sidenav-list">
    @for (item of menuItems; track item.route) {
      <button
        class="nav-item"
        [class.active]="layoutService.page() === item.route"
        (click)="layoutService.setPage(item.route)"
      >
        <span class="mat-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </button>
    }
  </nav>

  <div class="sidenav-foot">
    <div class="doc-no" style="line-height: 1.7; font-size: 10.5px">
      <div>單機版 · 本機 Workbook</div>
      <div>Author Yoyo8787</div>
    </div>
  </div>
</aside>
