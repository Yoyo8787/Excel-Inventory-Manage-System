<div
  class="dropzone"
  [class.drag-over]="isDragOver()"
  [style.pointer-events]="disabled() ? 'none' : 'auto'"
  [style.opacity]="disabled() ? '0.6' : '1'"
  (click)="!disabled() && fileInput.click()"
  (dragover)="handleDragOver($event)"
  (dragleave)="handleDragLeave()"
  (drop)="handleDrop($event)"
>
  <input
    #fileInput
    type="file"
    hidden
    [accept]="accept()"
    [disabled]="disabled()"
    (change)="handleFileChange($event)"
  />

  <span class="mat-icon lg" style="color:var(--mint-500);">cloud_upload</span>
  <div class="serif" style="font-size:15px; font-weight:700; margin-top:8px;">拖曳檔案至此</div>
  <div class="mono" style="font-size:11px; color:var(--ink-muted); margin-top:4px; letter-spacing:0.1em;">
    @if (selectedFileName()) {
      已選擇：{{ selectedFileName() }}
    } @else if (isDragOver()) {
      放開以上傳檔案
    } @else {
      {{ hint() }}
    }
  </div>

  <div style="position:absolute; top:8px; left:10px; font-family:var(--font-mono); font-size:9px; color:var(--ink-faint); letter-spacing:0.2em;">
    DROP ZONE
  </div>
</div>
