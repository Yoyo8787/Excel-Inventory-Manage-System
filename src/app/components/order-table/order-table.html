<table mat-table [dataSource]="orders()" class="mat-elevation-z8">
  <ng-container matColumnDef="platform">
    <th mat-header-cell *matHeaderCellDef>平台</th>
    <td mat-cell *matCellDef="let element" class="">{{ element.platform }}</td>
  </ng-container>
  <ng-container matColumnDef="orderNo">
    <th mat-header-cell *matHeaderCellDef>訂單編號</th>
    <td mat-cell *matCellDef="let element">{{ element.orderNo }}</td>
  </ng-container>
  <ng-container matColumnDef="importedAt">
    <th mat-header-cell *matHeaderCellDef>匯入時間</th>
    <td mat-cell *matCellDef="let element">
      {{ element.importedAt | date: 'yyyy-MM-dd HH:mm:ss' }}
    </td>
  </ng-container>
  <ng-container matColumnDef="productName">
    <th mat-header-cell *matHeaderCellDef>商品名稱</th>
    <td mat-cell *matCellDef="let element">
      @if (element.lines?.length) {
        <div class="flex flex-col gap-1 py-2">
          @for (line of element.lines; track line.lineId) {
            <div class="leading-5 justify-between flex min-w-80!">
              <span class="max-w-72 line-clamp-1">{{ line.platformProductName }}</span>
              <span>{{ line.subtotal }}</span>
            </div>
          }
        </div>
      } @else {
        -
      }
    </td>
  </ng-container>
  <ng-container matColumnDef="amountTotal">
    <th mat-header-cell *matHeaderCellDef>總金額</th>
    <td mat-cell *matCellDef="let element">
      {{ element.amountTotal }}
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
