<table mat-table [dataSource]="orders()" class="mat-elevation-z8">
  <ng-container matColumnDef="platform">
    <th mat-header-cell *matHeaderCellDef>平台</th>
    <td mat-cell *matCellDef="let element">{{ element.platform }}</td>
  </ng-container>
  <ng-container matColumnDef="orderNo">
    <th mat-header-cell *matHeaderCellDef>訂單編號</th>
    <td mat-cell *matCellDef="let element">{{ element.orderNo }}</td>
  </ng-container>
  <ng-container matColumnDef="customerName">
    <th mat-header-cell *matHeaderCellDef>客戶名稱</th>
    <td mat-cell *matCellDef="let element">{{ element.customerName }}</td>
  </ng-container>
  <ng-container matColumnDef="amountTotal">
    <th mat-header-cell *matHeaderCellDef>總金額</th>
    <td mat-cell *matCellDef="let element">{{ element.amountTotal }}</td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
